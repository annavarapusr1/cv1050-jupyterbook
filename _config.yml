title: "CV 1050: Vector Calculus and Numerical Methods"
author: "Department of Civil Engineering, IIT Madras"
logo: "iitm_logo.png"

execute:
  execute_notebooks: "off"
  timeout: 120

html:
  use_issues_button: false
  use_repository_button: false
  use_edit_page_button: false
  navbar_number_sections: true
  home_page_in_navbar: true
  extra_css:
    - _static/custom.css
  extra_navbar: ""
  google_analytics_id: ""

parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - deflist
    - dollarmath
    - html_admonition
    - html_image
    - linkify
    - replacements
    - smartquotes
    - substitution
    - tasklist
  myst_url_schemes: [mailto, http, https]

# Open in Colab button — instant, no Binder/Docker wait
launch_buttons:
  colab_url: "https://colab.research.google.com"

repository:
  url: https://github.com/annavarapusr1/cv1050-jupyterbook
  path_to_book: .
  branch: main

sphinx:
  config:
    mathjax_path: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    html_theme: sphinx_book_theme
    html_theme_options:
      use_fullscreen_button: true
      show_navbar_depth: 2
      repository_url: "https://github.com/annavarapusr1/cv1050-jupyterbook"
      repository_branch: "main"
      path_to_book: "."
      launch_buttons:
        colab_url: "https://colab.research.google.com"
