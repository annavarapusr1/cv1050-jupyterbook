[build]
  command   = "pip install -r requirements.txt && jupyter-book build . 2>&1 || (echo '=== BUILD FAILED ===' && ls -la && cat _config.yml && exit 1)"
  publish   = "_build/html"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200
